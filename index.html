<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 辰光共同語言：SEL 勇者傳說 ✨</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @keyframes rainbowFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        @keyframes shine { to { background-position: 200% center; } }
        @keyframes tada { 0% {transform: scale(1);} 10%, 20% {transform: scale(0.9) rotate(-3deg);} 30%, 50%, 70%, 90% {transform: scale(1.1) rotate(3deg);} 40%, 60%, 80% {transform: scale(1.1) rotate(-3deg);} 100% {transform: scale(1) rotate(0);} }

        body {
            font-family: 'Microsoft JhengHei', sans-serif; margin: 0; padding: 10px; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(-45deg, #ff00ff, #ff8c00, #00ffff, #32cd32); background-size: 400% 400%; animation: rainbowFlow 15s ease infinite; color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); overflow-x: hidden;
        }

        #box { width: 100%; max-width: 600px; background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(15px); padding: 30px; border: 6px solid #fbc02d; border-radius: 30px; box-shadow: 0 0 50px rgba(251, 192, 45, 1); text-align: center; box-sizing: border-box; }

        h1 {
            font-size: 42px; background: linear-gradient(to right, #fbc02d, #ffffff, #fbc02d); background-size: 200% auto;
            -webkit-background-clip: text; background-clip: text; color: transparent; animation: shine 2s linear infinite; filter: drop-shadow(0 0 10px #fbc02d); margin: 0 0 15px 0;
        }

        .gesture-img { width: 100%; max-width: 400px; border-radius: 20px; border: 4px solid #fff; margin: 15px 0; display: none; box-shadow: 0 0 20px #fff; }
        .active { display: inline-block; animation: zoomIn 0.5s ease; }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        #story { font-size: 24px; background: rgba(255, 255, 255, 0.15); padding: 20px; border-radius: 15px; margin: 20px 0; line-height: 1.6; border-left: 10px solid #fbc02d; text-align: left; }

        .btn {
            width: 100%; padding: 16px; margin: 10px 0; font-size: 22px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s;
            background: linear-gradient(90deg, #ff00ff, #00ffff); color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 25px #fff; }
        .btn:disabled { opacity: 0.8; }

        #feedback { font-size: 36px; margin-top: 15px; min-height: 50px; font-weight: bold; }
        .celebrate-text { animation: tada 1s; color: #ffff00; text-shadow: 0 0 10px #fff; }

        .nav-group { display: flex; justify-content: space-between; margin-top: 20px; }
        .nav-btn { width: 48%; background: #fbc02d; color: #333; font-size: 18px; border-radius: 15px; font-weight: bold; }
    </style>
</head>
<body>

<div id="box">
    <h1>✨ 辰光共同語言 ✨</h1>

    <div id="login-ui">
        <p style="font-size: 22px;">勇者學號：</p>
        <input type="text" id="sid" style="padding:15px; width:80%; font-size:22px; border-radius:12px; border:none; text-align:center;">
        <br><br>
        <button class="btn" onclick="startGame()">開始 50 關挑戰 🚩</button>
    </div>

    <div id="game-ui" style="display:none;">
        <div style="display:flex; justify-content:space-between; font-size:20px; color:#ffff00; font-weight:bold;">
            <span>進度: <span id="progress">0</span> / 50</span>
            <span>積分: <span id="score">0</span> 🏆</span>
        </div>

        <img id="img-silence" class="gesture-img" src="5G-SILENCE.png">
        <img id="img-words" class="gesture-img" src="5G-WORDS TO SAY.png">
        <img id="img-eyes" class="gesture-img" src="5G-EYES ON ME.png">
        <img id="img-emotion" class="gesture-img" src="5G-EMOTIONS.png">

        <div id="story"></div>
        <div id="options"></div>
        <div id="feedback"></div>

        <div class="nav-group">
            <button class="btn nav-btn" onclick="location.reload()">🏠 返回首頁</button>
            <button class="btn nav-btn" id="nextBtn" onclick="nextQuestion()" style="visibility: hidden;">下一題 ➡️</button>
        </div>
    </div>
</div>

<script>
    let sid, score = 0, currentIdx = 0, questions = [];
    
    // === 預加載歡慶與錯誤音效 ===
    // 使用 Google 提供的穩定音效連結
    const sndCorrect = new Audio('https://actions.google.com/sounds/v1/cartoon/clink_pizzicato.ogg');
    const sndCelebrate = new Audio('https://actions.google.com/sounds/v1/human_voices/applause.ogg');
    const sndWrong = new Audio('https://actions.google.com/sounds/v1/cartoon/boing.ogg');

    const db = [
        { s: "大家吵成一團，教室快爆炸了，希望大家安靜下來，要比？", c: 0, img: "img-silence" },
        { s: "老師問了問題，你腦中有個好棒的答案，我有話要說時？", c: 1, img: "img-words" },
        { s: "老師說：『看我看我！』要大家專心聽老師說話，該比？", c: 2, img: "img-eyes" },
        { s: "被同學誤會了，心裡酸酸的，目前不想說話，你可以比？", c: 3, img: "img-emotion" },
        { s: "圖書館有人在追逐，想提醒大家安靜，要施展魔法？", c: 0, img: "img-silence" },
        { s: "聽不懂數學公式，想要舉手請教老師問題，你要比？", c: 1, img: "img-words" },
        { s: "台上同學正在演講，我們要給予專注的禮貌，手勢是？", c: 2, img: "img-eyes" },
        { s: "考試考砸了，覺得好沮喪，想讓自己冷靜且暫不想說話？", c: 3, img: "img-emotion" },
        { s: "校長廣播重要訊息，全班應該立刻靜止，並比出？", c: 0, img: "img-silence" },
        { s: "你想跟老師打招呼，爭取發言機會，手勢是？", c: 1, img: "img-words" },
        { s: "老師在黑板畫重點，提醒大家：『眼神看過來』？", c: 2, img: "img-eyes" },
        { s: "心情悶悶的，想摸摸胸口觀察情緒，手勢是？", c: 3, img: "img-emotion" }
    ];

    while(db.length < 50) { db.push(...db.slice(0, 50 - db.length)); }

    const options = ["1. 安靜魔法 (Silence) ✊", "2. 我有話要說 (Words to Say) ☝️", "3. 專心看我 (Eyes on Me) 👀", "4. 我有情緒 (Emotions) ❤️"];

    function startGame() {
        sid = document.getElementById('sid').value;
        if(!sid) return alert("請輸入學號！");
        // 觸發一次音效解鎖（手機瀏覽器需要）
        sndCorrect.play(); sndCorrect.pause();
        document.getElementById('login-ui').style.display='none';
        document.getElementById('game-ui').style.display='block';
        questions = db.sort(() => Math.random() - 0.5).slice(0, 50);
        render();
    }

    function render() {
        const q = questions[currentIdx];
        document.getElementById('progress').innerText = currentIdx + 1;
        document.getElementById('story').innerText = q.s;
        document.getElementById('feedback').innerText = "";
        document.getElementById('feedback').classList.remove('celebrate-text');
        document.getElementById('nextBtn').style.visibility = "hidden";
        
        document.querySelectorAll('.gesture-img').forEach(i => i.classList.remove('active'));
        document.getElementById(q.img).classList.add('active');

        const optDiv = document.getElementById('options');
        optDiv.innerHTML = "";
        options.forEach((txt, i) => {
            const b = document.createElement('button');
            b.className = 'btn'; b.innerText = txt;
            b.onclick = () => check(i, q.c);
            optDiv.appendChild(b);
        });
    }

    function check(pick, correct) {
        const btns = document.querySelectorAll('#options .btn');
        if(pick === correct) {
            score += 20;
            document.getElementById('score').innerText = score;
            document.getElementById('feedback').innerText = "🎊 答對了！太棒了 🎊";
            document.getElementById('feedback').classList.add('celebrate-text');
            
            // 播放音效
            sndCorrect.play();
            sndCelebrate.play();

            // 噴灑五彩紙屑效果
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#ff00ff', '#00ffff', '#ffff00', '#ffffff']
            });

            btns.forEach(b => {
                b.disabled = true;
                if(b.innerText === options[correct]) b.style.background = "#4caf50";
            });
            document.getElementById('nextBtn').style.visibility = "visible";
        } else {
            document.getElementById('feedback').innerText = "❌ 再想一下喔！";
            sndWrong.play();
        }
    }

    function nextQuestion() {
        currentIdx++;
        if(currentIdx < 50) render();
        else finish();
    }

    function finish() {
        sndCelebrate.play();
        confetti({ particleCount: 300, spread: 100, origin: { y: 0.5 } });
        document.getElementById('game-ui').innerHTML = `
            <div style="font-size:100px">🏆</div>
            <h2 class="celebrate-text">大滿貫！勇者達成！</h2>
            <p>恭喜學號 ${sid} 完成辰光共同語言挑戰！</p>
            <div style="font-size:36px; color:#ffff00; margin:20px 0;">總積分：${score}</div>
            <button class="btn" onclick="location.reload()">再玩一次 🔄</button>
        `;
    }
</script>
</body>
</html>
