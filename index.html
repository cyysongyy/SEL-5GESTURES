<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ 辰光小勇者：50關 SEL 傳說 ✨</title>
    <style>
        @keyframes rainbowFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        body {
            font-family: 'Microsoft JhengHei', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh;
            background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab); background-size: 400% 400%; animation: rainbowFlow 15s ease infinite; color: white;
        }
        #box { width: 90%; max-width: 550px; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(15px); padding: 30px; border: 5px solid #fbc02d; border-radius: 30px; box-shadow: 0 0 30px rgba(251, 192, 45, 0.8); text-align: center; }
        .gesture-img { width: 100%; border-radius: 20px; border: 4px solid #fff; margin: 15px 0; display: none; box-shadow: 0 0 15px #fff; }
        .active { display: block; animation: zoomIn 0.5s ease; }
        @keyframes zoomIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        #story { font-size: 22px; background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px; margin: 20px 0; line-height: 1.5; border-left: 8px solid #fbc02d; text-align: left; }
        .btn { width: 100%; padding: 15px; margin: 8px 0; font-size: 20px; font-weight: bold; border: none; border-radius: 50px; cursor: pointer; transition: 0.3s; background: linear-gradient(90deg, #ff00ff, #00ffff); color: white; text-shadow: 1px 1px 2px #000; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 20px #fff; }
        .stats { display: flex; justify-content: space-between; font-size: 18px; color: #ffff00; font-weight: bold; margin-bottom: 10px; }
    </style>
</head>
<body>
<div id="box">
    <h1>✨ 辰光小勇者 ✨</h1>
    <div id="login-ui">
        <p>勇者請報上名來（班級學號）：</p>
        <input type="text" id="sid" style="padding:15px; width:80%; font-size:18px; border-radius:10px; text-align:center;">
        <br><br>
        <button class="btn" onclick="startGame()">開啟 50 關傳說 🚩</button>
    </div>
    <div id="game-ui" style="display:none;">
        <div class="stats"><span>進度: <span id="progress">0</span> / 50</span><span>積分: <span id="score">0</span> 🏆</span></div>
        <img id="img-silence" class="gesture-img" src="5G-SILENCE.png">
        <img id="img-speak" class="gesture-img" src="5G-TO SAY.png">
        <img id="img-eyes" class="gesture-img" src="5G-EYES ON ME.png">
        <img id="img-emotion" class="gesture-img" src="5G-EMOTIONS.png">
        <div id="story"></div><div id="options"></div><div id="feedback" style="font-size: 30px; margin-top: 15px;"></div>
    </div>
</div>

<script>
    let sid, score = 0, currentIdx = 0, errs = 0, startTime;
    const scriptURL = "https://script.google.com/macros/s/AKfycbxARUMLo5lwuX2Z1pDWGQnYJPWbOIacfuTYtLvmtxQaMMSEMjI4IC_Rk684OuIc2_M_VQ/exec";

    const allStories = [
        { s: "下課鐘響了，教室還很吵，老師準備上課，這時要？", c: 0, img: "img-silence" },
        { s: "你想回答老師的問題，該怎麼做才有禮貌？", c: 1, img: "img-speak" },
        { s: "老師說：『大家看我看我！』這時你要比？", c: 2, img: "img-eyes" },
        { s: "心愛的小鉛筆被踩斷了，你覺得心裡酸酸的，請先？", c: 3, img: "img-emotion" },
        { s: "有人插隊排洗手台，你快要發火了！這時要啟動？", c: 3, img: "img-emotion" },
        { s: "走廊上有其他班級在午睡，我們經過時應該？", c: 0, img: "img-silence" },
        { s: "你聽不懂剛才的數學題，想要舉手請教老師？", c: 1, img: "img-speak" },
        { s: "台上同學在表演魔術，我們要專注看著他？", c: 2, img: "img-eyes" },
        { s: "上台領獎好緊張，手心在出汗，請摸摸胸口施展？", c: 3, img: "img-emotion" },
        { s: "校長要在廣播裡宣佈重要事情，大家要？", c: 0, img: "img-silence" }
        // ... 此處簡略，建議校長之後自行補足至 50 個故事
    ];

    const optionText = ["1. 手舉拳頭 (Silence) ✊", "2. 我有話要說 ☝️", "3. Eyes On Me 👀", "4. 我有情緒 (Emotion) ❤️"];

    function startGame() {
        sid = document.getElementById('sid').value;
        if(!sid) return alert("請輸入學號！");
        document.getElementById('login-ui').style.display='none';
        document.getElementById('game-ui').style.display='block';
        allStories.sort(() => Math.random() - 0.5);
        loadQ();
    }

    function loadQ() {
        if(currentIdx >= 10) { finish(); return; } // 先測 10 題
        const q = allStories[currentIdx];
        document.getElementById('progress').innerText = currentIdx + 1;
        document.getElementById('story').innerText = q.s;
        document.getElementById('feedback').innerText = "";
        document.querySelectorAll('.gesture-img').forEach(i => i.classList.remove('active'));
        document.getElementById(q.img).classList.add('active');
        const optArea = document.getElementById('options');
        optArea.innerHTML = "";
        startTime = new Date();
        optionText.forEach((t, i) => {
            const b = document.createElement('button');
            b.className = 'btn'; b.innerText = t;
            b.onclick = () => check(i);
            optArea.appendChild(b);
        });
    }

    function check(i) {
        const q = allStories[currentIdx];
        if(i === q.correct) {
            score += 20;
            document.getElementById('score').innerText = score;
            document.getElementById('feedback').innerText = "✅ 🎉 成功！";
            save(q.s, optionText[i], errs, Math.floor((new Date()-startTime)/1000));
            setTimeout(() => { currentIdx++; errs=0; loadQ(); }, 1000);
        } else {
            errs++; document.getElementById('feedback').innerText = "❌ 再試一次！";
        }
    }

    function save(st, gs, er, dr) {
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ studentId: sid, levelName: st, gesture: gs, errors: er, duration: dr, emotion: "測驗中", result: er===0?"一次過":"重試過" })});
    }

    function finish() {
        document.getElementById('game-ui').innerHTML = `<h2 style="color:#ffff00">👑 任務達成！</h2><p>數據已傳回校長室。<br>總積分：${score}</p><button class="btn" onclick="location.reload()">重新挑戰</button>`;
    }
</script>
</body>
</html>
